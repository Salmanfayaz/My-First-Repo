<body>
    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Animated Website</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    overflow-x: hidden;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    padding: 15px 50px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    z-index: 1000;
}

nav h1 {
    color: #38bdf8;
}

nav ul {
    display: flex;
    list-style: none;
}

nav ul li {
    margin-left: 25px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

nav ul li a:hover {
    color: #38bdf8;
}

/* HERO SECTION */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h2 {
    font-size: 50px;
    animation: fadeIn 2s ease-in-out;
}

/* CARDS */
.cards {
    padding: 80px 50px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 30px;
}

.card {
    background: #1e293b;
    border-radius: 20px;
    overflow: hidden;
    transition: 0.5s;
    position: relative;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 20px;
}

.card:hover {
    transform: translateY(-15px) scale(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* HOVER EFFECT */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(56,189,248,0.5), transparent);
    opacity: 0;
    transition: 0.5s;
}

.card:hover::before {
    opacity: 1;
}

/* GALLERY */
.gallery {
    padding: 80px 50px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    transition: 0.5s;
}

.gallery img:hover {
    transform: scale(1.1) rotate(2deg);
}

/* FOOTER */
footer {
    padding: 20px;
    text-align: center;
    background: #020617;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

.reveal {
    opacity: 0;
    transform: translateY(60px);
    transition: 1s;
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* RESPONSIVE */
@media(max-width:768px){
    .hero h2 {
        font-size: 30px;
    }
}
</style>
</head>

<body>

<nav>
    <h1>MySite</h1>
    <ul>
        <li><a href="#cards">Services</a></li>
        <li><a href="#gallery">Gallery</a></li>
    </ul>
</nav>

<section class="hero">
    <h2>Welcome to Future Web Design</h2>
</section>

<section id="cards" class="cards">
    <div class="card reveal">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
        <div class="card-content">
            <h3>Web Design</h3>
            <p>Modern and responsive designs.</p>
        </div>
    </div>

    <div class="card reveal">
        <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f">
        <div class="card-content">
            <h3>Development</h3>
            <p>Fast and scalable solutions.</p>
        </div>
    </div>

    <div class="card reveal">
        <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
        <div class="card-content">
            <h3>Marketing</h3>
            <p>Grow your audience digitally.</p>
        </div>
    </div>
</section>

<section id="gallery" class="gallery">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" class="reveal">
    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="reveal">
    <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d" class="reveal">
    <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e" class="reveal">
</section>

<footer>
    <p>© 2026 Advanced Website | All Rights Reserved</p>
</footer>

<script>
// SMOOTH SCROLL
$('a').on('click', function(e) {
    if (this.hash !== "") {
        e.preventDefault();
        const hash = this.hash;
        $('html, body').animate({
            scrollTop: $(hash).offset().top
        }, 800);
    }
});

// SCROLL ANIMATION
$(window).on('scroll', function() {
    $('.reveal').each(function() {
        let top = $(this).offset().top;
        let windowHeight = $(window).height();
        let scroll = $(window).scrollTop();

        if (scroll > top - windowHeight + 100) {
            $(this).addClass('active');
        }
    });
});

// NAVBAR SCROLL EFFECT
$(window).scroll(function(){
    if($(this).scrollTop() > 50){
        $('nav').css("background", "rgba(0,0,0,0.9)");
    } else {
        $('nav').css("background", "rgba(0,0,0,0.5)");
    }
});
</script>

</body>
</html>
</body>
</html>
